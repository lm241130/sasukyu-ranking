<!DOCTYPE html>
<html lang="ja">
<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>都道府県別　家事時間ランキング</title>
		<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
		<style>
				body {
						font-family: sans-serif;
						margin: 20px;
						background-color: #f9f9f9;
				}
				#main {
						width: 100%;
						max-width: 900px;
						height: 800px;
						margin: 0 auto;
						background-color: #ffffff;
						box-shadow: 0 0 10px rgba(124, 120, 120, 0.05);
						padding: 20px;
						border-radius: 8px;
				}
		</style>
</head>
<body>

		<div id="main"></div>

		<script>
				var chartDom = document.getElementById('main');
				var myChart = echarts.init(chartDom);
				var option;

				// 九州地方の色（赤）とそれ以外の色（元のテンプレート色）
				var kyushuColor = '#ff4d4f';
				var defaultColor = '#C0C0C0';

				option = {
					title: {
						text: '都道府県別 家事時間ランキング',
						left: 'center',
						textStyle: {
							color: '#333',
							fontSize: 18
						}
					},
					tooltip: {
						trigger: 'axis',
						axisPointer: {
							type: 'shadow'
						},
						formatter: function(params) {
							const item = params[0];
							const rawTime = option.series[0].rawData[item.dataIndex];
							return item.name + ': <b>' + rawTime + '</b> (' + item.value + '分)';
						}
					},
					grid: {
						left: '10%',
						right: '10%',
						bottom: '5%',
						containLabel: true
					},
					xAxis: {
						type: 'value',
						name: '時間（分）',
						axisLabel: {
							formatter: '{value} 分'
						}
					},
					yAxis: {
						type: 'category',
						data: [
							'石川県', '大分県', '熊本県', '山口県', '愛媛県', '長崎県', '岡山県', '兵庫県', '佐賀県', '沖縄県', 
							'茨城県', '山形県', '広島県', '徳島県', '大阪府', '岩手県', '香川県', '秋田県', '富山県', '岐阜県', 
							'三重県', '滋賀県', '福岡県', '北海道', '静岡県', '東京都', '埼玉県', '宮城県', '鳥取県', '京都府', 
							'愛知県', '福島県', '青森県', '山梨県', '神奈川県', '鹿児島県', '栃木県', '宮崎県', '島根県', '群馬県', 
							'長野県', '福井県', '千葉県', '和歌山県', '高知県', '新潟県', '奈良県'
						],
						axisLabel: {
							interval: 0
						}
					},
					series: [
						{
							type: 'bar',
							// 各データごとに itemStyle を設定して九州だけ赤に変えています
							data: [
								60, 
								{ value: 84, itemStyle: { color: kyushuColor } }, // 大分県
								{ value: 85, itemStyle: { color: kyushuColor } }, // 熊本県
								88, 89, 
								{ value: 90, itemStyle: { color: kyushuColor } }, // 長崎県
								94, 94, 
								{ value: 95, itemStyle: { color: kyushuColor } }, // 佐賀県
								{ value: 98, itemStyle: { color: kyushuColor } }, // 沖縄県
								100, 100, 101, 102, 102, 102, 103, 103, 104, 106, 108, 109, 
								{ value: 110, itemStyle: { color: kyushuColor } }, // 福岡県
								111, 112, 114, 114, 114, 117, 118, 118, 118, 118, 120, 123, 
								{ value: 125, itemStyle: { color: kyushuColor } }, // 鹿児島県
								125, 
								{ value: 130, itemStyle: { color: kyushuColor } }, // 宮崎県
								133, 134, 137, 137, 140, 141, 147, 153, 155
							],
							rawData: [
								'1時間', '1時間24分', '1時間25分', '1時間28分', '1時間29分', '1時間30分', '1時間34分', '1時間34分', '1時間35分', '1時間38分', 
								'1時間40分', '1時間40分', '1時間41分', '1時間42分', '1時間42分', '1時間42分', '1時間43分', '1時間43分', '1時間44分', '1時間46分', 
								'1時間48分', '1時間49分', '1時間50分', '1時間51分', '1時間52分', '1時間54分', '1時間54分', '1時間54分', '1時間57分', '1時間58分', 
								'1時間58分', '1時間58分', '1時間58分', '2時間', '2時間3分', '2時間5分', '2時間5分', '2時間10分', '2時間13分', '2時間14分', 
								'2時間17分', '2時間17分', '2時間20分', '2時間21分', '2時間27分', '2時間33分', '2時間35分'
							],
							itemStyle: {
								color: defaultColor // 個別指定がない都道府県のデフォルト色
							}
						}
					]
				};

				option && myChart.setOption(option);
		</script>
</body>
</html>
